<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#13294B"/>
      <stop offset="100%" style="stop-color:#1B3A6B"/>
    </linearGradient>
    <!-- Lobster body shading -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FF6B47"/>
      <stop offset="100%" style="stop-color:#E84A27"/>
    </radialGradient>
    <radialGradient id="clawGrad" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#FF6B47"/>
      <stop offset="100%" style="stop-color:#D4401F"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="200" rx="14" fill="url(#bgGrad)"/>

  <!-- === LOBSTER MASCOT (left side) === -->
  <g transform="translate(28, 16) scale(0.82)">

    <!-- Tail segments (bottom) -->
    <ellipse cx="78" cy="175" rx="18" ry="10" fill="#D4401F"/>
    <ellipse cx="78" cy="160" rx="22" ry="12" fill="url(#bodyGrad)"/>
    <ellipse cx="78" cy="145" rx="24" ry="12" fill="url(#bodyGrad)"/>

    <!-- Small legs -->
    <g stroke="#D4401F" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M55 150 Q40 160 35 172"/>
      <path d="M55 138 Q38 145 30 155"/>
      <path d="M100 150 Q115 160 120 172"/>
      <path d="M100 138 Q117 145 125 155"/>
    </g>

    <!-- Body (torso) -->
    <ellipse cx="78" cy="118" rx="32" ry="28" fill="url(#bodyGrad)"/>
    <!-- Body segment lines -->
    <path d="M50 108 Q78 112 106 108" stroke="#D4401F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M48 120 Q78 124 108 120" stroke="#D4401F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M50 132 Q78 136 106 132" stroke="#D4401F" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Left arm -->
    <path d="M48 105 Q30 85 22 70" stroke="url(#bodyGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Left claw (big pincer) -->
    <ellipse cx="14" cy="52" rx="20" ry="28" fill="url(#clawGrad)" transform="rotate(-15, 14, 52)"/>
    <!-- Left claw inner -->
    <path d="M6 38 Q14 28 22 38" stroke="#FF8866" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Left claw split -->
    <path d="M8 30 Q14 22 20 30" stroke="#D4401F" stroke-width="2.5" fill="none"/>

    <!-- Right arm -->
    <path d="M108 105 Q126 85 134 70" stroke="url(#bodyGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Right claw (big pincer, raised higher) -->
    <ellipse cx="142" cy="42" rx="22" ry="32" fill="url(#clawGrad)" transform="rotate(15, 142, 42)"/>
    <!-- Right claw highlight -->
    <path d="M134 28 Q142 16 150 28" stroke="#FF8866" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Right claw split -->
    <path d="M136 18 Q142 10 148 18" stroke="#D4401F" stroke-width="2.5" fill="none"/>

    <!-- Head -->
    <circle cx="78" cy="82" r="26" fill="url(#bodyGrad)"/>

    <!-- Antennae -->
    <path d="M65 62 Q58 38 50 22" stroke="#E84A27" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M91 62 Q98 38 106 22" stroke="#E84A27" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Antenna tips -->
    <circle cx="49" cy="20" r="3" fill="#E84A27"/>
    <circle cx="107" cy="20" r="3" fill="#E84A27"/>

    <!-- Eyes -->
    <ellipse cx="68" cy="76" rx="8" ry="9" fill="white"/>
    <ellipse cx="88" cy="76" rx="8" ry="9" fill="white"/>
    <!-- Pupils (looking slightly to the right, mischievous) -->
    <circle cx="71" cy="77" r="4.5" fill="#13294B"/>
    <circle cx="91" cy="77" r="4.5" fill="#13294B"/>
    <!-- Eye shine -->
    <circle cx="69" cy="74" r="1.8" fill="white"/>
    <circle cx="89" cy="74" r="1.8" fill="white"/>

    <!-- Eyebrows (mischievous angle) -->
    <path d="M60 68 Q68 64 76 67" stroke="#B8351A" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M80 67 Q88 64 96 68" stroke="#B8351A" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Mouth (smirk) -->
    <path d="M66 90 Q78 100 90 90" stroke="#B8351A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Smirk corner -->
    <path d="M90 90 Q93 88 94 86" stroke="#B8351A" stroke-width="2" stroke-linecap="round" fill="none"/>

  </g>

  <!-- === TEXT === -->

  <!-- "Illini" in white -->
  <text x="210" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="bold" fill="#FFFFFF" letter-spacing="2">Illini</text>

  <!-- "CLAW" in Illini orange, chunky style -->
  <text x="460" y="114" font-family="'Impact', 'Arial Black', sans-serif" font-size="74" font-weight="900" fill="#E84A27" letter-spacing="3">CLAW</text>

  <!-- Tagline -->
  <text x="213" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#8899BB" letter-spacing="0.8">
    WhatsApp AI Teaching Assistant Blueprint
  </text>

  <!-- Accent line -->
  <rect x="212" y="164" width="100" height="2.5" rx="1.25" fill="#E84A27" opacity="0.7"/>

  <!-- Powered by -->
  <text x="213" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#556B8A" letter-spacing="0.5">
    Powered by OpenClaw
  </text>

</svg>

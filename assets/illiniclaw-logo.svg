<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E84A27"/>
      <stop offset="100%" style="stop-color:#C83A1A"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#13294B"/>
      <stop offset="100%" style="stop-color:#1B3A6B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="16" fill="url(#bgGrad)"/>

  <!-- Claw marks -->
  <g transform="translate(40, 30)">
    <!-- Claw slash 1 -->
    <path d="M30 10 Q35 60 20 170 Q18 185 25 190 Q32 185 35 170 Q50 60 45 10 Z" fill="url(#clawGrad)" opacity="0.95"/>
    <!-- Claw slash 2 -->
    <path d="M65 5 Q70 55 55 175 Q53 190 60 195 Q67 190 70 175 Q85 55 80 5 Z" fill="url(#clawGrad)" opacity="0.9"/>
    <!-- Claw slash 3 -->
    <path d="M100 10 Q105 60 90 170 Q88 185 95 190 Q102 185 105 170 Q120 60 115 10 Z" fill="url(#clawGrad)" opacity="0.85"/>
  </g>

  <!-- Text: IlliniClaw -->
  <text x="200" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#FFFFFF" letter-spacing="2">
    Illini<tspan fill="#E84A27">Claw</tspan>
  </text>

  <!-- Tagline -->
  <text x="203" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#8899BB" letter-spacing="1">
    WhatsApp AI Teaching Assistant Blueprint
  </text>

  <!-- Accent line -->
  <rect x="200" y="175" width="120" height="3" rx="1.5" fill="#E84A27" opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E1F3B"/>
      <stop offset="50%" style="stop-color:#13294B"/>
      <stop offset="100%" style="stop-color:#1B3A6B"/>
    </linearGradient>
    <radialGradient id="bodyG" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FF6B47"/>
      <stop offset="100%" style="stop-color:#E84A27"/>
    </radialGradient>
    <radialGradient id="clawG" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#FF6B47"/>
      <stop offset="100%" style="stop-color:#D4401F"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Large faded lobster watermark (top-left) -->
  <g transform="translate(80, 40) scale(2.8)" opacity="0.08">
    <ellipse cx="78" cy="175" rx="18" ry="10" fill="#E84A27"/>
    <ellipse cx="78" cy="160" rx="22" ry="12" fill="#E84A27"/>
    <ellipse cx="78" cy="145" rx="24" ry="12" fill="#E84A27"/>
    <ellipse cx="78" cy="118" rx="32" ry="28" fill="#E84A27"/>
    <path d="M48 105 Q30 85 22 70" stroke="#E84A27" stroke-width="14" stroke-linecap="round" fill="none"/>
    <ellipse cx="14" cy="52" rx="20" ry="28" fill="#E84A27" transform="rotate(-15, 14, 52)"/>
    <path d="M108 105 Q126 85 134 70" stroke="#E84A27" stroke-width="14" stroke-linecap="round" fill="none"/>
    <ellipse cx="142" cy="42" rx="22" ry="32" fill="#E84A27" transform="rotate(15, 142, 42)"/>
    <circle cx="78" cy="82" r="26" fill="#E84A27"/>
    <path d="M65 62 Q58 38 50 22" stroke="#E84A27" stroke-width="3.5" fill="none"/>
    <path d="M91 62 Q98 38 106 22" stroke="#E84A27" stroke-width="3.5" fill="none"/>
  </g>

  <!-- Title -->
  <text x="470" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">Illini</text>
  <text x="810" y="272" font-family="'Impact', 'Arial Black', sans-serif" font-size="104" font-weight="900" fill="#E84A27" text-anchor="middle" letter-spacing="4">CLAW</text>

  <!-- Tagline -->
  <text x="640" y="330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#8899BB" text-anchor="middle" letter-spacing="2">
    WhatsApp AI Teaching Assistant Blueprint
  </text>

  <!-- Accent line -->
  <rect x="520" y="355" width="240" height="3" rx="1.5" fill="#E84A27" opacity="0.7"/>

  <!-- Feature pills -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">
    <rect x="270" y="400" width="140" height="36" rx="18" fill="#1E3D6B" stroke="#2A4D7B" stroke-width="1"/>
    <text x="340" y="423" text-anchor="middle" fill="#AAC0DD">Socratic AI</text>
    <rect x="430" y="400" width="150" height="36" rx="18" fill="#1E3D6B" stroke="#2A4D7B" stroke-width="1"/>
    <text x="505" y="423" text-anchor="middle" fill="#AAC0DD">Drip Campaigns</text>
    <rect x="600" y="400" width="120" height="36" rx="18" fill="#1E3D6B" stroke="#2A4D7B" stroke-width="1"/>
    <text x="660" y="423" text-anchor="middle" fill="#AAC0DD">Guardrails</text>
    <rect x="740" y="400" width="150" height="36" rx="18" fill="#1E3D6B" stroke="#2A4D7B" stroke-width="1"/>
    <text x="815" y="423" text-anchor="middle" fill="#AAC0DD">Knowledge RAG</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="#E84A27" opacity="0.8"/>

  <!-- Powered by + University -->
  <text x="640" y="510" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#667B9A" text-anchor="middle" letter-spacing="1">
    Powered by OpenClaw
  </text>
  <text x="640" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#556B8A" text-anchor="middle" letter-spacing="3">
    UNIVERSITY OF ILLINOIS · GIES COLLEGE OF BUSINESS
  </text>
